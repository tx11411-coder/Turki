name: Python CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    # خطوة إعداد بايثون
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    # خطوة تثبيت المكتبات (بدلاً من npm install)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    # خطوة تشغيل البوت (تأكد أن الملف باسم main.py)
    - name: Run Bot
      run: python main.py
